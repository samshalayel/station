  /api/v1/maintenance-requests/{id}:
    get:
      tags: [MaintenanceRequests]
      summary: Get maintenance request by id
      description: Returns a specific maintenance request.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Maintenance request retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenanceRequestResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Maintenance request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Resource identifier
      schema:
        type: integer
        format: int64
        minimum: 1

  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: string
      required:
        - success
        - message

    Station:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Central Station
        address:
          type: string
          example: Nablus - Main Street
      required:
        - id
        - name
        - address

    CreateStationRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          example: Central Station
        address:
          type: string
          minLength: 3
          example: Nablus - Main Street
      required:
        - name
        - address

    UpdateStationRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          example: Central Station
        address:
          type: string
          minLength: 3
          example: Nablus - Main Street
      required:
        - name
        - address

    StationResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Station'
      required:
        - success
        - data

    StationListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Station'
      required:
        - success
        - data

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: Ahmad Ali
        email:
          type: string
          format: email
          example: ahmad@example.com
      required:
        - id
        - name
        - email

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          example: Ahmad Ali
        email:
          type: string
          format: email
          example: ahmad@example.com
      required:
        - name
        - email

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          example: Ahmad Ali
        email:
          type: string
          format: email
          example: ahmad@example.com
      required:
        - name
        - email

    UserResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/User'
      required:
        - success
        - data

    UserListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
      required:
        - success
        - data

    MaintenanceRequest:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1001
        stationId:
          type: integer
          format: int64
          example: 1
        requestedByUserId:
          type: integer
          format: int64
          example: 10
        status:
          type: string
          enum: [Pending, Approved, Rejected, Completed]
          example: Pending
        description:
          type: string
          example: Fuel pump requires inspection
      required:
        - id
        - stationId
        - requestedByUserId
        - status
        - description

    CreateMaintenanceRequestRequest:
      type: object
      properties:
        stationId:
          type: integer
          format: int64
          minimum: 1
          example: 1
        requestedByUserId:
          type: integer
          format: int64
          minimum: 1
          example: 10
        description:
          type: string
          minLength: 5
          example: Fuel pump requires inspection
      required:
        - stationId
        - requestedByUserId
        - description

    MaintenanceRequestResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/MaintenanceRequest'
      required:
        - success
        - data

    MaintenanceRequestListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/MaintenanceRequest'
      required:
        - success
        - data